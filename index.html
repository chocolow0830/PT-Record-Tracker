<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>PT Studio — 学生核对系统</title>
<style>
:root{--ink:#10221b;--paper:#f6f4ee;--card:#fff;--line:#e2ddd2;--moss:#1f5d4c;--moss-d:#15463a;
--gold:#c9a24b;--rust:#b23a2e;--amber:#d98a1f;--green:#2f8f5b;--grey:#8a8378;--soft:#f0ede4;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Helvetica Neue',-apple-system,'Noto Sans CJK SC','PingFang SC',sans-serif;background:var(--paper);color:var(--ink);font-size:14px;line-height:1.5}
.app{display:flex;min-height:100vh}
.side{width:208px;background:var(--moss-d);color:#dfe9e3;flex-shrink:0;position:sticky;top:0;height:100vh;display:flex;flex-direction:column}
.brand{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.brand h1{font-size:15px;letter-spacing:.5px;font-weight:700;color:#fff}
.brand .sub{font-size:11px;color:var(--gold);margin-top:3px;letter-spacing:1px;text-transform:uppercase}
.nav{padding:10px 0;flex:1}
.nav a{display:flex;align-items:center;gap:10px;padding:11px 18px;color:#cdd9d2;cursor:pointer;font-size:13px;border-left:3px solid transparent;user-select:none}
.nav a:hover{background:rgba(255,255,255,.05)}
.nav a.on{background:var(--moss);border-left-color:var(--gold);color:#fff;font-weight:600}
.nav .ic{width:18px;text-align:center;font-size:15px}
.nav .badge{margin-left:auto;background:var(--rust);color:#fff;font-size:10px;padding:1px 7px;border-radius:9px;font-weight:700}
.sync{padding:12px 18px;font-size:11px;color:#9fb3ab;border-top:1px solid rgba(255,255,255,.1)}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:6px}
.dot.off{background:var(--rust)}
.main{flex:1;padding:26px 30px;max-width:1200px}
.head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.head h2{font-size:22px;font-weight:700;letter-spacing:-.3px}
.head .note{font-size:12px;color:var(--grey)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:16px 18px;position:relative;overflow:hidden}
.kpi .n{font-size:30px;font-weight:800;letter-spacing:-1px;line-height:1}
.kpi .l{font-size:12px;color:var(--grey);margin-top:6px}
.kpi::after{content:'';position:absolute;left:0;top:0;width:4px;height:100%}
.kpi.k-red::after{background:var(--rust)}.kpi.k-amber::after{background:var(--amber)}
.kpi.k-green::after{background:var(--green)}.kpi.k-grey::after{background:var(--grey)}.kpi.k-moss::after{background:var(--moss)}
.card{background:var(--card);border:1px solid var(--line);border-radius:11px;margin-bottom:20px;overflow:hidden}
.card .ct{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.card .ct h3{font-size:15px;font-weight:700}
.card .ct .desc{font-size:12px;color:var(--grey)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;background:var(--soft);font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#6b655b;font-weight:700;border-bottom:1px solid var(--line)}
td{padding:9px 12px;border-bottom:1px solid #efece4;vertical-align:middle}
tr:hover td{background:#faf9f5}
.tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.t-over{background:#fbe3e0;color:var(--rust)}.t-under{background:#fbeed6;color:#9a6310}
.t-ok{background:#dff0e5;color:#1c6b41}.t-nomatch{background:#ebe8e1;color:#6b655b}
.t-collision{background:#f3e8d0;color:#8a6d1e}.t-nolog{background:#fbeed6;color:#9a6310}
.num{font-variant-numeric:tabular-nums;font-weight:600}
.diff-pos{color:var(--rust);font-weight:700}.diff-neg{color:var(--amber);font-weight:700}.diff-ok{color:var(--green)}
.rv{font-size:11px;padding:2px 8px;border-radius:6px;border:1px solid var(--line);background:#fff}
.rv.done{background:#dff0e5;border-color:#bfe0cd;color:#1c6b41}.rv.issue{background:#fbe3e0;border-color:#f0c5c0;color:var(--rust)}
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
input,select,textarea{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--moss);outline-offset:-1px}
.search{flex:1;min-width:180px}
.btn{padding:8px 14px;border:none;border-radius:8px;background:var(--moss);color:#fff;font-weight:600;cursor:pointer;font-size:13px}
.btn:hover{background:var(--moss-d)}.btn.ghost{background:#fff;color:var(--moss);border:1px solid var(--moss)}
.btn.gold{background:var(--gold);color:#3a2e10}.btn.sm{padding:5px 10px;font-size:12px}
.chip{padding:6px 12px;border-radius:20px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:12px;font-weight:600;color:#6b655b}
.chip.on{background:var(--moss);color:#fff;border-color:var(--moss)}
.ov{position:fixed;inset:0;background:rgba(16,34,27,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.ov.show{display:flex}
.modal{background:var(--card);border-radius:14px;width:560px;max-width:100%;max-height:90vh;overflow:auto}
.modal .mh{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.modal .mh h3{font-size:17px}
.modal .mb{padding:20px 22px}
.fg{margin-bottom:14px}.fg label{display:block;font-size:12px;font-weight:700;color:#6b655b;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{width:100%}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mf{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
.x{cursor:pointer;font-size:22px;color:var(--grey);line-height:1;border:none;background:none}
.info-box{background:var(--soft);border-radius:8px;padding:10px 12px;font-size:12px;color:#6b655b;margin-bottom:14px;line-height:1.55}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:9px;font-size:13px;z-index:60;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
.empty{padding:40px;text-align:center;color:var(--grey);font-size:13px}
.mini{font-size:11px;color:var(--grey)}
.tr-bar{height:7px;background:var(--soft);border-radius:4px;overflow:hidden;min-width:80px;display:inline-block;width:100%;vertical-align:middle}
.tr-bar i{display:block;height:100%;background:var(--moss)}
/* gate */
#gate{position:fixed;inset:0;background:var(--moss-d);display:flex;align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:0}
.gatebox{background:#fff;border-radius:16px;padding:34px 32px;width:340px;max-width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.gatebox h1{font-size:20px;color:var(--moss-d);margin-bottom:4px}
.gatebox .gs{font-size:12px;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:22px}
.gatebox input{width:100%;text-align:center;font-size:16px;padding:12px;margin-bottom:12px;letter-spacing:2px}
.gatebox .err{color:var(--rust);font-size:12px;height:16px;margin-bottom:6px}
.gatebox button{width:100%;padding:12px;font-size:15px}
.loading{color:#9fb3ab;font-size:13px;margin-top:18px}
@media(max-width:760px){.side{width:56px}.brand h1,.brand .sub,.nav a span.lbl,.sync{display:none}
.nav a{justify-content:center;padding:14px 0}.main{padding:16px}.frow{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="gate">
  <div class="gatebox">
    <h1>PT STUDIO</h1>
    <div class="gs">学生核对系统</div>
    <div class="err" id="gErr"></div>
    <input type="password" id="gPass" placeholder="输入密码 Password" autocomplete="current-password"/>
    <button class="btn" onclick="tryGate()">进入 Enter</button>
    <div class="loading" id="gLoad"></div>
  </div>
</div>

<div class="app" id="appWrap" style="display:none">
  <aside class="side">
    <div class="brand"><h1>PT STUDIO</h1><div class="sub">核对系统 · Records</div></div>

      <a data-v="trainers"><span class="ic">◍</span><span class="lbl">教练 Trainers</span></a>
    </nav>
    <div class="sync"><span class="dot" id="syncDot"></span><span id="syncTxt">连接中…</span></div>
  </aside>
  <main class="main" id="view"></main>
</div>

<div class="ov" id="ov"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// doc references: one doc holds whole dataset (simple + atomic for this scale)
const DOC = doc(db, "ptstudio", "data");

let DB=null, VIEW='dash', FILTER='all', Q='', UNSUB=null, SAVING=false;

/* ---------- GATE ---------- */
window.tryGate = async function(){
  const v=document.getElementById('gPass').value;
  const err=document.getElementById('gErr');
  if(v!==PASSWORD){ err.textContent='密码错误 Wrong password'; return; }
  err.textContent=''; document.getElementById('gLoad').textContent='连接中… Connecting';
  try{
    await signInAnonymously(auth);
  }catch(e){
    err.textContent='连接失败:'+e.code;
    document.getElementById('gLoad').textContent='';
  }
};
document.getElementById('gPass').addEventListener('keydown',e=>{if(e.key==='Enter')window.tryGate();});

onAuthStateChanged(auth, async (user)=>{
  if(!user) return;
  // ensure data doc exists (first-run import)
  const snap=await getDoc(DOC);
  if(!snap.exists()){
    document.getElementById('gLoad').textContent='首次导入资料… Importing';
    await setDoc(DOC, SEED);
  }
  // live subscribe
  UNSUB=onSnapshot(DOC,(s)=>{
    if(!s.exists())return;
    DB=s.data();
    document.getElementById('gate').style.display='none';
    document.getElementById('appWrap').style.display='flex';
    setSync(true);
    render();
  },(e)=>{ setSync(false); toast('同步错误 '+e.code); });
});

function setSync(ok){
  document.getElementById('syncDot').classList.toggle('off',!ok);
  document.getElementById('syncTxt').textContent= ok? '实时同步 Live':'离线 Offline';
}

async function persist(silent){
  SAVING=true;
  try{ await setDoc(DOC, DB); if(!silent){const t=document.getElementById('syncTxt');t.textContent='已保存 ✓';setTimeout(()=>setSync(true),1200);} }
  catch(e){ toast('储存失败 '+e.code); }
  SAVING=false;
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}

const TAG={OVER:['t-over','🔴 超签'],UNDER:['t-under','少claim'],OK:['t-ok','对齐'],
  NO_MATCH:['t-nomatch','无对应'],NO_CLAIM:['t-nomatch','无claim'],COLLISION:['t-collision','同名风险'],NO_LOG:['t-nolog','无log']};
function tag(f){const t=TAG[f]||['t-nomatch',f];return `<span class="tag ${t[0]}">${t[1]}</span>`;}
function diffCell(d){if(d===null||d===undefined||d==='')return '<span class="mini">—</span>';
  if(d>2)return `<span class="diff-pos">+${d}</span>`;if(d<-2)return `<span class="diff-neg">${d}</span>`;
  return `<span class="diff-ok">${d>=0?'+':''}${d}</span>`;}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function countFlag(f){return DB.students.filter(s=>s.flag===f).length;}

function vDash(){
  const m=DB.meta;const over=DB.students.filter(s=>s.flag==='OVER');
  over.sort((a,b)=>(b.claim-b.logged)-(a.claim-a.logged));
  let rows=over.slice(0,8).map(s=>`<tr onclick="openStudent('${esc(s.id)}')" style="cursor:pointer">
     <td><b>${esc(s.name)}</b></td><td class="num">${s.logged}</td><td class="num">${s.claim}</td>
     <td>${diffCell(s.claim-s.logged)}</td><td class="mini">${esc(s.claim_trainers)}</td>
     <td>${s.review?`<span class="rv ${s.review==='已确认'?'done':'issue'}">${s.review}</span>`:'<span class="mini">未核</span>'}</td></tr>`).join('');
  return `<div class="head"><h2>总览 Dashboard</h2><div class="note">手写实际堂数 vs excel总claim · 共 ${DB.students.length} 位学生</div></div>
  <div class="kpis">
    <div class="kpi k-moss"><div class="n">${DB.students.length}</div><div class="l">学生总数 Students</div></div>
    <div class="kpi k-red"><div class="n">${countFlag('OVER')}</div><div class="l">🔴 超签 Over-claimed</div></div>
    <div class="kpi k-amber"><div class="n">${countFlag('UNDER')}</div><div class="l">少claim Under</div></div>
    <div class="kpi k-grey"><div class="n">${countFlag('NO_MATCH')+countFlag('NO_CLAIM')}</div><div class="l">无对应 No match</div></div>
    <div class="kpi k-green"><div class="n">${countFlag('OK')}</div><div class="l">已对齐 Aligned</div></div>
    <div class="kpi k-amber"><div class="n">${DB.pending.length}</div><div class="l">待确认 Pending</div></div>
  </div>
  <div class="card"><div class="ct"><h3>🔴 优先处理 — 超签学生</h3><div class="desc">claim 多过手写实际堂数,点击查看</div></div>
    ${over.length?`<table><thead><tr><th>学生</th><th>手写</th><th>Claim</th><th>差异</th><th>Claim教练</th><th>核对</th></tr></thead><tbody>${rows}</tbody></table>`:'<div class="empty">没有超签 ✓</div>'}</div>
  <div class="card"><div class="ct"><h3>核对进度 Review progress</h3></div><div style="padding:16px 18px">${reviewProgress()}</div></div>`;
}
function reviewProgress(){
  const fl=DB.students.filter(s=>['OVER','UNDER','COLLISION','NO_MATCH','NO_CLAIM','NO_LOG'].includes(s.flag));
  const done=fl.filter(s=>s.review).length;const pct=fl.length?Math.round(done/fl.length*100):100;
  return `<div style="display:flex;align-items:center;gap:14px"><div class="tr-bar" style="flex:1;height:12px"><i style="width:${pct}%"></i></div><b>${done}/${fl.length}</b> <span class="mini">已核对 (${pct}%)</span></div>`;
}
function vStudents(){
  const list=DB.students.filter(s=>{if(FILTER!=='all'&&s.flag!==FILTER)return false;
    if(Q&&!(s.name.toLowerCase().includes(Q)||(s.claim_trainers||'').toLowerCase().includes(Q)))return false;return true;});
  const order={OVER:0,COLLISION:1,NO_LOG:1,UNDER:2,NO_MATCH:3,NO_CLAIM:3,OK:4};
  list.sort((a,b)=>(order[a.flag]??5)-(order[b.flag]??5)||a.name.localeCompare(b.name));
  const rows=list.map(s=>`<tr onclick="openStudent('${esc(s.id)}')" style="cursor:pointer">
    <td><b>${esc(s.name)}</b>${s.note?' 📝':''}</td><td class="mini">${esc(s.trainer_record)||'—'}</td>
    <td class="mini">${esc(s.pkg_raw)||'—'}</td><td class="num">${s.logged}</td><td class="num">${s.claim}</td>
    <td>${diffCell(['OK','OVER','UNDER','NO_LOG','COLLISION'].includes(s.flag)?(s.claim-s.logged):null)}</td>
    <td>${tag(s.flag)}</td><td>${s.review?`<span class="rv ${s.review==='已确认'?'done':'issue'}">${s.review}</span>`:'<span class="mini">—</span>'}</td></tr>`).join('');
  const chips=[['all','全部'],['OVER','🔴超签'],['UNDER','少claim'],['COLLISION','同名风险'],['NO_MATCH','无对应'],['NO_CLAIM','无claim'],['NO_LOG','无log'],['OK','已对齐']]
    .map(c=>`<span class="chip ${FILTER===c[0]?'on':''}" onclick="setFilter('${c[0]}')">${c[1]}</span>`).join('');
  return `<div class="head"><h2>学生 Students</h2><div class="note">${list.length} / ${DB.students.length} 位</div></div>
  <div class="bar"><input class="search" id="srch" placeholder="搜索学生 / 教练..." value="${esc(Q)}" oninput="onSearch(this.value)"/>
    <button class="btn gold" onclick="openStudent(null)">+ 新增学生 Add</button></div>
  <div class="bar">${chips}</div>
  <div class="card">${list.length?`<table><thead><tr><th>学生</th><th>封面教练</th><th>配套</th><th>手写</th><th>Claim</th><th>差异</th><th>状态</th><th>核对</th></tr></thead><tbody>${rows}</tbody></table>`:'<div class="empty">没有符合的学生</div>'}</div>`;
}
function vAlign(){
  const list=DB.students.filter(s=>['OVER','UNDER','COLLISION','NO_LOG'].includes(s.flag));
  const order={OVER:0,COLLISION:1,NO_LOG:1,UNDER:2};
  list.sort((a,b)=>(order[a.flag]-order[b.flag])||(b.claim-b.logged)-(a.claim-a.logged));
  const rows=list.map(s=>`<tr><td><b>${esc(s.name)}</b></td><td class="num">${s.logged}</td><td class="num">${s.claim}</td>
    <td>${diffCell(s.claim-s.logged)}</td><td>${tag(s.flag)}</td><td class="mini">${esc(s.status_auto)}</td>
    <td><select class="rv" onchange="setReview('${esc(s.id)}',this.value)">
      <option value="" ${!s.review?'selected':''}>未核</option>
      <option value="已确认" ${s.review==='已确认'?'selected':''}>✓已确认</option>
      <option value="有问题" ${s.review==='有问题'?'selected':''}>⚠有问题</option></select></td>
    <td><input class="rv" style="width:130px" placeholder="备注" value="${esc(s.note)}" onchange="setNote('${esc(s.id)}',this.value)"/></td></tr>`).join('');
  return `<div class="head"><h2>核对 Alignment</h2><div class="note">逐个确认差异 · ${list.length} 项</div></div>
  <div class="info-box">规则:同一学生不论几个教练带,所有claim加总对比手写实际堂数。<b>claim > 手写 = 超签</b>。教练不同不算错。</div>
  <div class="card"><div class="ct"><h3>需核对清单</h3><div class="desc">${reviewProgress()}</div></div>
  <table><thead><tr><th>学生</th><th>手写</th><th>Claim</th><th>差异</th><th>状态</th><th>说明</th><th>核对</th><th>备注</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function vPending(){
  const rows=DB.pending.map((p,i)=>`<tr><td><b>${esc(p.src)}</b></td><td class="mini">${esc(p.pkg)}</td><td class="mini">${esc(p.dates)}</td>
    <td class="mini">${esc(p.hint)}</td><td class="mini">${esc(p.guess)||'—'}</td>
    <td><input class="rv" style="width:100px" placeholder="教练" value="${esc(p.trainer)}" onchange="setPend(${i},'trainer',this.value)"/></td>
    <td><input class="rv" style="width:130px" placeholder="学生名" value="${esc(p.student)}" onchange="setPend(${i},'student',this.value)"/></td>
    <td><select class="rv" onchange="setPend(${i},'status',this.value)">
      <option value="" ${!p.status?'selected':''}>未定</option>
      <option value="已归属" ${p.status==='已归属'?'selected':''}>✓已归属</option>
      <option value="无法确认" ${p.status==='无法确认'?'selected':''}>无法确认</option></select></td></tr>`).join('');
  return `<div class="head"><h2>待确认 Pending</h2><div class="note">无封面孤儿 log,需人手归属</div></div>
  <div class="info-box">这些 log 页扫描时没有封面。系统已按 <b>日期+配套+签名</b> 推测。员工核实原稿后填回。</div>
  <div class="card"><table><thead><tr><th>来源页</th><th>配套</th><th>日期范围</th><th>线索</th><th>系统推测</th><th>教练</th><th>学生名</th><th>状态</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function vTrainers(){
  const max=Math.max(...DB.trainers.map(t=>t.sessions));
  const rows=DB.trainers.map(t=>`<tr><td><b>${esc(t.name)}</b></td><td class="num">${t.clients}</td><td class="num">${t.sessions}</td>
    <td><span class="tr-bar"><i style="width:${Math.round(t.sessions/max*100)}%"></i></span></td></tr>`).join('');
  const tot=DB.trainers.reduce((a,t)=>a+t.sessions,0);
  return `<div class="head"><h2>教练 Trainers</h2><div class="note">共 ${tot} session</div></div>
  <div class="card"><div class="ct"><h3>各教练 session 统计</h3><div class="desc">2024–2026 全部月份</div></div>
  <table><thead><tr><th>教练</th><th>学生数</th><th>Sessions</th><th>占比</th></tr></thead><tbody>${rows}</tbody></table></div>
  <div class="info-box">含同名 client,部分需配合「核对」页人手分辨。</div>`;
}

window.openStudent=function(id){
  const isNew=!id;
  const s=isNew?{id:'',name:'',trainer_record:'',pkg_raw:'',logged:0,claim:0,claim_trainers:'',detail:'',flag:'OK',status_auto:'',review:'',note:''}
    :DB.students.find(x=>x.id===id);
  const m=document.getElementById('modal');
  m.innerHTML=`<div class="mh"><h3>${isNew?'新增学生 Add':esc(s.name)}</h3><button class="x" onclick="closeOv()">×</button></div>
    <div class="mb">${!isNew?`<div class="info-box">系统判定:${tag(s.flag)} ${esc(s.status_auto)}<br>Claim明细: ${esc(s.detail)||'—'}</div>`:''}
      <div class="fg"><label>学生名 Name</label><input id="f_name" value="${esc(s.name)}"/></div>
      <div class="frow"><div class="fg"><label>封面教练</label><input id="f_tr" value="${esc(s.trainer_record)}"/></div>
        <div class="fg"><label>配套 Package</label><input id="f_pkg" value="${esc(s.pkg_raw)}"/></div></div>
      <div class="frow"><div class="fg"><label>手写堂数 Logged</label><input id="f_log" type="number" value="${s.logged}"/></div>
        <div class="fg"><label>excel总Claim</label><input id="f_claim" type="number" value="${s.claim}"/></div></div>
      <div class="fg"><label>Claim教练(参考)</label><input id="f_ctr" value="${esc(s.claim_trainers)}"/></div>
      <div class="frow"><div class="fg"><label>核对 Review</label><select id="f_rv">
          <option value="" ${!s.review?'selected':''}>未核</option><option value="已确认" ${s.review==='已确认'?'selected':''}>✓已确认</option>
          <option value="有问题" ${s.review==='有问题'?'selected':''}>⚠有问题</option></select></div>
        <div class="fg"><label>状态 Flag</label><select id="f_flag">
          ${['OK','OVER','UNDER','COLLISION','NO_MATCH','NO_CLAIM','NO_LOG'].map(f=>`<option ${s.flag===f?'selected':''}>${f}</option>`).join('')}</select></div></div>
      <div class="fg"><label>备注 Note</label><textarea id="f_note" rows="2">${esc(s.note)}</textarea></div></div>
    <div class="mf">${!isNew?`<button class="btn ghost" style="margin-right:auto;color:var(--rust);border-color:var(--rust)" onclick="delStudent('${esc(s.id)}')">删除</button>`:''}
      <button class="btn ghost" onclick="closeOv()">取消</button>
      <button class="btn" onclick="saveStudent('${esc(s.id)}',${isNew})">保存 Save</button></div>`;
  document.getElementById('ov').classList.add('show');
};
window.saveStudent=async function(id,isNew){
  const g=x=>document.getElementById(x).value;
  const name=g('f_name').trim();if(!name){toast('请填学生名');return;}
  const obj={name,trainer_record:g('f_tr'),pkg_raw:g('f_pkg'),logged:+g('f_log')||0,claim:+g('f_claim')||0,
    claim_trainers:g('f_ctr'),review:g('f_rv'),flag:g('f_flag'),note:g('f_note')};
  if(isNew){obj.id=name+'_'+Date.now();obj.detail='';obj.status_auto='手动新增';DB.students.push(obj);}
  else{Object.assign(DB.students.find(x=>x.id===id),obj);}
  await persist();closeOv();toast('已保存 ✓');
};
window.delStudent=async function(id){if(!confirm('确定删除? Delete?'))return;
  DB.students=DB.students.filter(x=>x.id!==id);await persist();closeOv();toast('已删除');};
window.setReview=async function(id,v){DB.students.find(x=>x.id===id).review=v;await persist(true);};
window.setNote=async function(id,v){DB.students.find(x=>x.id===id).note=v;await persist(true);};
window.setPend=async function(i,k,v){DB.pending[i][k]=v;await persist(true);};
window.setFilter=function(f){FILTER=f;render();};
window.onSearch=function(v){Q=v.toLowerCase();render(true);};
window.closeOv=function(){document.getElementById('ov').classList.remove('show');};
document.getElementById('ov').addEventListener('click',e=>{if(e.target.id==='ov')closeOv();});

function updateBadges(){
  const fl=DB.students.filter(s=>['OVER','UNDER','COLLISION','NO_MATCH','NO_CLAIM','NO_LOG'].includes(s.flag));
  const undone=fl.filter(s=>!s.review).length;const pend=DB.pending.filter(p=>!p.status).length;
  const a=document.getElementById('bAlign'),p=document.getElementById('bPend');
  a.textContent=undone||'';a.style.display=undone?'':'none';
  p.textContent=pend||'';p.style.display=pend?'':'none';
}
function render(keepSearch){
  if(!DB)return;
  const v={dash:vDash,students:vStudents,align:vAlign,pending:vPending,trainers:vTrainers}[VIEW];
  document.getElementById('view').innerHTML=v();
  document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('on',a.dataset.v===VIEW));
  updateBadges();
  if(keepSearch&&VIEW==='students'){const s=document.getElementById('srch');if(s){s.focus();s.setSelectionRange(s.value.length,s.value.length);}}
}
document.getElementById('nav').addEventListener('click',e=>{const a=e.target.closest('a');if(!a)return;VIEW=a.dataset.v;Q='';FILTER='all';render();});
</script>
</body>
</html>
