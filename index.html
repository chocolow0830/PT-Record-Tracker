<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>PT Studio — 学生核对系统</title>
<style>
:root{--ink:#10221b;--paper:#f6f4ee;--card:#fff;--line:#e2ddd2;--moss:#1f5d4c;--moss-d:#15463a;
--gold:#c9a24b;--rust:#b23a2e;--amber:#d98a1f;--green:#2f8f5b;--grey:#8a8378;--soft:#f0ede4;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Helvetica Neue',-apple-system,'Noto Sans CJK SC','PingFang SC',sans-serif;background:var(--paper);color:var(--ink);font-size:14px;line-height:1.5}
.app{display:flex;min-height:100vh}
.side{width:212px;background:var(--moss-d);color:#dfe9e3;flex-shrink:0;position:sticky;top:0;height:100vh;display:flex;flex-direction:column}
.brand{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.brand h1{font-size:15px;letter-spacing:.5px;font-weight:700;color:#fff}
.brand .sub{font-size:11px;color:var(--gold);margin-top:3px;letter-spacing:1px;text-transform:uppercase}
.nav{padding:8px 0;flex:1;overflow-y:auto}
.navsec{font-size:10px;color:#6f8a80;padding:10px 18px 4px;letter-spacing:1px;text-transform:uppercase}
.nav a{display:flex;align-items:center;gap:10px;padding:10px 18px;color:#cdd9d2;cursor:pointer;font-size:13px;border-left:3px solid transparent;user-select:none}
.nav a:hover{background:rgba(255,255,255,.05)}
.nav a.on{background:var(--moss);border-left-color:var(--gold);color:#fff;font-weight:600}
.nav .ic{width:18px;text-align:center;font-size:14px}
.nav .badge{margin-left:auto;background:var(--rust);color:#fff;font-size:10px;padding:1px 7px;border-radius:9px;font-weight:700}
.sync{padding:12px 18px;font-size:11px;color:#9fb3ab;border-top:1px solid rgba(255,255,255,.1)}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:6px}
.dot.off{background:var(--rust)}
.main{flex:1;padding:26px 30px;max-width:1220px}
.head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.head h2{font-size:22px;font-weight:700;letter-spacing:-.3px}
.head .note{font-size:12px;color:var(--grey)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:16px 18px;position:relative;overflow:hidden}
.kpi .n{font-size:28px;font-weight:800;letter-spacing:-1px;line-height:1}
.kpi .l{font-size:12px;color:var(--grey);margin-top:6px}
.kpi::after{content:'';position:absolute;left:0;top:0;width:4px;height:100%}
.kpi.k-red::after{background:var(--rust)}.kpi.k-amber::after{background:var(--amber)}
.kpi.k-green::after{background:var(--green)}.kpi.k-grey::after{background:var(--grey)}.kpi.k-moss::after{background:var(--moss)}.kpi.k-gold::after{background:var(--gold)}
.card{background:var(--card);border:1px solid var(--line);border-radius:11px;margin-bottom:20px;overflow:hidden}
.card .ct{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.card .ct h3{font-size:15px;font-weight:700}
.card .ct .desc{font-size:12px;color:var(--grey)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;background:var(--soft);font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:#6b655b;font-weight:700;border-bottom:1px solid var(--line)}
td{padding:9px 12px;border-bottom:1px solid #efece4;vertical-align:middle}
tr:hover td{background:#faf9f5}
.tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.t-over{background:#fbe3e0;color:var(--rust)}.t-under{background:#fbeed6;color:#9a6310}
.t-ok{background:#dff0e5;color:#1c6b41}.t-nomatch{background:#ebe8e1;color:#6b655b}
.t-collision{background:#f3e8d0;color:#8a6d1e}.t-nolog{background:#fbeed6;color:#9a6310}
.pill{display:inline-block;background:#e7efe9;color:var(--moss);border:1px solid #cfe0d6;border-radius:14px;padding:1px 9px;font-size:11px;font-weight:600;margin:1px 2px}
.num{font-variant-numeric:tabular-nums;font-weight:600}
.diff-pos{color:var(--rust);font-weight:700}.diff-neg{color:var(--amber);font-weight:700}.diff-ok{color:var(--green)}
.rv{font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid var(--line);background:#fff}
.rv.done{background:#dff0e5;border-color:#bfe0cd;color:#1c6b41}.rv.issue{background:#fbe3e0;border-color:#f0c5c0;color:var(--rust)}
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
input,select,textarea{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--moss);outline-offset:-1px}
.search{flex:1;min-width:180px}
.btn{padding:8px 14px;border:none;border-radius:8px;background:var(--moss);color:#fff;font-weight:600;cursor:pointer;font-size:13px}
.btn:hover{background:var(--moss-d)}.btn.ghost{background:#fff;color:var(--moss);border:1px solid var(--moss)}
.btn.gold{background:var(--gold);color:#3a2e10}.btn.sm{padding:5px 10px;font-size:12px}.btn.rust{background:#fff;color:var(--rust);border:1px solid var(--rust)}
.chip{padding:6px 12px;border-radius:20px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:12px;font-weight:600;color:#6b655b}
.chip.on{background:var(--moss);color:#fff;border-color:var(--moss)}
.ov{position:fixed;inset:0;background:rgba(16,34,27,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.ov.show{display:flex}
.modal{background:var(--card);border-radius:14px;width:680px;max-width:100%;max-height:92vh;overflow:auto}
.modal .mh{padding:16px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:2}
.modal .mh h3{font-size:17px}
.modal .mb{padding:18px 22px}
.fg{margin-bottom:14px}.fg label{display:block;font-size:12px;font-weight:700;color:#6b655b;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{width:100%}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mf{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:#fff}
.x{cursor:pointer;font-size:20px;color:var(--grey);line-height:1;border:none;background:none}
.info-box{background:var(--soft);border-radius:8px;padding:10px 12px;font-size:12px;color:#6b655b;margin-bottom:14px;line-height:1.55}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:9px;font-size:13px;z-index:60;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
.empty{padding:40px;text-align:center;color:var(--grey);font-size:13px}
.mini{font-size:11px;color:var(--grey)}
.tr-bar{height:7px;background:var(--soft);border-radius:4px;overflow:hidden;min-width:80px;display:inline-block;width:100%;vertical-align:middle}
.tr-bar i{display:block;height:100%;background:var(--moss)}
/* round card */
.rcard{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;background:#fcfbf8}
.rcard.over{border-color:#f0c5c0;background:#fdf2f1}
.rcard .rh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.rcard .rh b{color:var(--moss)}
/* trainer multi-select chips */
.tsel{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.tchip{padding:4px 10px;border-radius:16px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:12px;user-select:none}
.tchip.on{background:var(--moss);color:#fff;border-color:var(--moss);font-weight:600}
#gate{position:fixed;inset:0;background:var(--moss-d);display:flex;align-items:center;justify-content:center;z-index:100;flex-direction:column}
.gatebox{background:#fff;border-radius:16px;padding:34px 32px;width:340px;max-width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.gatebox h1{font-size:20px;color:var(--moss-d);margin-bottom:4px}
.gatebox .gs{font-size:12px;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:22px}
.gatebox input{width:100%;text-align:center;font-size:16px;padding:12px;margin-bottom:12px;letter-spacing:2px}
.gatebox .err{color:var(--rust);font-size:12px;height:16px;margin-bottom:6px}
.gatebox button{width:100%;padding:12px;font-size:15px}
.loading{color:#9fb3ab;font-size:13px;margin-top:18px}
.yrtab{display:flex;gap:6px;margin-bottom:18px}
.yrtab .chip{font-size:14px;padding:8px 18px}
@media(max-width:760px){.side{width:54px}.brand h1,.brand .sub,.nav a span.lbl,.navsec,.sync{display:none}
.nav a{justify-content:center;padding:13px 0}.main{padding:16px}.frow{grid-template-columns:1fr}}
</style>
</head>

<div id="gate"><div class="gatebox">

</div></div>

/* ---------- migration: ensure new structure on any old data ---------- */
function migrate(){
  if(!DB) return;
  if(!DB.trainer_profiles) DB.trainer_profiles=['William','Marzlan','Choco','Wai Kit','Zeta Fong','Zhen','Celeste','Chloe','Jordan','Vivi'].map(n=>({name:n,active:true,note:''}));
  if(!DB.package_profiles) DB.package_profiles=[];
  (DB.students||[]).forEach(s=>{
    if(!Array.isArray(s.rounds)||!s.rounds.length){
      s.rounds=[{trainers:[],package:'',price:0,dates:'',logged:s.logged||0,claim:s.claim||0}];
    }
    s.rounds.forEach(r=>{
      if(!Array.isArray(r.trainers)) r.trainers = r.trainer? [r.trainer]:[];
      if(r.package===undefined) r.package='';
      if(r.price===undefined) r.price=0;
      if(r.dates===undefined) r.dates='';
      if(r.logged===undefined) r.logged=0;
      if(r.claim===undefined) r.claim=0;
    });
  });
}
function trainerNames(){return (DB.trainer_profiles||[]).map(t=>t.name);}
function pkgLabel(p){return `${p.year} · ${p.name} · RM${p.price}`;}
function findPkg(id){return (DB.package_profiles||[]).find(p=>p.id===id);}

/* ---------- compute ---------- */
function recompute(s){
  let claim=0,logged=0,revenue=0;
  (s.rounds||[]).forEach(r=>{claim+=+r.claim||0;logged+=+r.logged||0;revenue+=+r.price||0;});
  s.claim=claim;s.logged=logged;s.revenue=revenue;
  s.round_over=(s.rounds||[]).some(r=>{const p=findPkg(r.package);const cap=p?capOf(p.name):0;return cap>0&&(+r.claim||0)>cap;});
  if(['OK','OVER','UNDER','NO_LOG'].includes(s.flag)||s.round_over){
    if(logged===0&&claim>0)s.flag='NO_LOG';
    else if(s.round_over||(claim-logged)>2)s.flag='OVER';
    else if((claim-logged)<-2)s.flag='UNDER';
    else s.flag='OK';
  }
}
function capOf(name){const m=String(name).match(/(\d+)\s*SS/i)||String(name).match(/(\d+)/);return m?+m[1]:0;}
function recomputeAll(){(DB.students||[]).forEach(recompute);}
function countFlag(f){return DB.students.filter(s=>s.flag===f).length;}

const TAG={OVER:['t-over','🔴 超签'],UNDER:['t-under','少claim'],OK:['t-ok','对齐'],
  NO_MATCH:['t-nomatch','无对应'],NO_CLAIM:['t-nomatch','无claim'],COLLISION:['t-collision','同名风险'],NO_LOG:['t-nolog','无log']};
function tag(f){const t=TAG[f]||['t-nomatch',f];return `<span class="tag ${t[0]}">${t[1]}</span>`;}
function diffCell(d){if(d===null||d===undefined||d==='')return '<span class="mini">—</span>';
  if(d>2)return `<span class="diff-pos">+${d}</span>`;if(d<-2)return `<span class="diff-neg">${d}</span>`;
  return `<span class="diff-ok">${d>=0?'+':''}${d}</span>`;}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function trPills(arr){return (arr&&arr.length)?arr.map(t=>`<span class="pill">${esc(t)}</span>`).join(''):'<span class="mini">—</span>';}

function roundYear(r){
  const m=String(r.dates||'').match(/(20\d{2})/);

}

  const list=DB.students.filter(s=>['OVER','UNDER','COLLISION','NO_LOG'].includes(s.flag));
  const order={OVER:0,COLLISION:1,NO_LOG:1,UNDER:2};
  list.sort((a,b)=>(order[a.flag]-order[b.flag])||(b.claim-b.logged)-(a.claim-a.logged));
  const rows=list.map(s=>`<tr><td><b>${esc(s.name)}</b></td><td>${trPills(s.trainers)}</td><td class="num">${s.logged}</td><td class="num">${s.claim}</td>
    <td>${diffCell(s.claim-s.logged)}</td><td>${tag(s.flag)}</td>
    <td><select class="rv" onchange="setReview('${esc(s.id)}',this.value)">
      <option value="" ${!s.review?'selected':''}>未核</option><option value="已确认" ${s.review==='已确认'?'selected':''}>✓已确认</option>
      <option value="有问题" ${s.review==='有问题'?'selected':''}>⚠有问题</option></select></td>
    <td><input class="rv" style="width:140px" placeholder="备注" value="${esc(s.note)}" onchange="setNote('${esc(s.id)}',this.value)"/></td></tr>`).join('');
  return `<div class="head"><h2>核对 Alignment</h2><div class="note">逐个确认差异 · ${list.length} 项</div></div>
  <div class="info-box">规则:同一学生不论几个教练带,所有claim加总对比手写实际堂数。<b>claim > 手写 = 超签</b>。教练不同不算错。点学生名进 Students 可改每轮明细。</div>
  <div class="card"><div class="ct"><h3>需核对清单</h3><div class="desc">${reviewProgress()}</div></div>
  <table><thead><tr><th>学生</th><th>教练</th><th>手写</th><th>Claim</th><th>差异</th><th>状态</th><th>核对</th><th>备注</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* ================= Pending ================= */
function vPending(){
  const rows=DB.pending.map((p,i)=>`<tr><td><b>${esc(p.src)}</b></td><td class="mini">${esc(p.pkg)}</td><td class="mini">${esc(p.dates)}</td>
    <td class="mini">${esc(p.hint)}</td><td class="mini">${esc(p.guess)||'—'}</td>
    <td><input class="rv" style="width:100px" placeholder="教练" value="${esc(p.trainer)}" onchange="setPend(${i},'trainer',this.value)"/></td>
    <td><input class="rv" style="width:130px" placeholder="学生名" value="${esc(p.student)}" onchange="setPend(${i},'student',this.value)"/></td>
    <td><select class="rv" onchange="setPend(${i},'status',this.value)">
      <option value="" ${!p.status?'selected':''}>未定</option><option value="已归属" ${p.status==='已归属'?'selected':''}>✓已归属</option>
      <option value="无法确认" ${p.status==='无法确认'?'selected':''}>无法确认</option></select></td></tr>`).join('');
  return `<div class="head"><h2>待确认 Pending</h2><div class="note">无封面孤儿 log,需人手归属</div></div>
  <div class="info-box">扫描时没有封面的 log 页。系统已按 日期+配套+签名 推测。员工核实原稿后填回。</div>
  <div class="card"><table><thead><tr><th>来源页</th><th>配套</th><th>日期范围</th><th>线索</th><th>系统推测</th><th>教练</th><th>学生名</th><th>状态</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* ================= Trainer Profile ================= */
function vTrainers(){
  const rows=(DB.trainer_profiles||[]).map((t,i)=>`<tr>
    <td><b>${esc(t.name)}</b></td>
    <td>${t.active!==false?'<span class="tag t-ok">在职</span>':'<span class="tag t-nomatch">停用</span>'}</td>
    <td><input class="rv" style="width:200px" placeholder="备注" value="${esc(t.note||'')}" onchange="setTrainer(${i},'note',this.value)"/></td>
    <td><button class="btn sm ghost" onclick="setTrainer(${i},'active',${t.active===false})">${t.active===false?'设为在职':'设为停用'}</button>
        <button class="x" onclick="delTrainer(${i})" title="删除">×</button></td></tr>`).join('');
  return `<div class="head"><h2>教练 Trainer Profile</h2><div class="note">${(DB.trainer_profiles||[]).length} 位 · 学生那边用这名单选教练</div></div>
  <div class="bar"><input id="newtr" class="search" placeholder="新教练名字..." style="max-width:240px"/>
    <button class="btn gold" onclick="addTrainer()">+ 加教练 Add</button></div>
  <div class="card"><table><thead><tr><th>教练</th><th>状态</th><th>备注</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* ================= Package Profile ================= */
function vPackages(){
  const rows=(DB.package_profiles||[]).map((p,i)=>`<tr>
    <td><input class="rv" style="width:80px" type="number" value="${p.year||''}" onchange="setPkg(${i},'year',+this.value)"/></td>
    <td><input class="rv" style="width:140px" value="${esc(p.name||'')}" placeholder="如 12SS" onchange="setPkg(${i},'name',this.value)"/></td>
    <td>RM<input class="rv" style="width:90px" type="number" value="${p.price||0}" onchange="setPkg(${i},'price',+this.value)"/></td>
    <td><input class="rv" style="width:200px" value="${esc(p.note||'')}" placeholder="备注" onchange="setPkg(${i},'note',this.value)"/></td>
    <td><button class="x" onclick="delPkg(${i})" title="删除">×</button></td></tr>`).join('');
  return `<div class="head"><h2>配套 Package Profile</h2><div class="note">${(DB.package_profiles||[]).length} 个配套 · 学生每轮从这里选</div></div>
  <div class="info-box">在这里加你每一年的配套和卖价。例如「2024 / 12SS / RM1200」。加好之后,学生每轮 renew 就能用 dropdown 选,系统自动带出价钱来算营业额。</div>
  <div class="bar"><button class="btn gold" onclick="addPkg()">+ 加配套 Add Package</button></div>
  <div class="card"><table><thead><tr><th>年份</th><th>配套名</th><th>卖价</th><th>备注</th><th></th></tr></thead><tbody>${rows||''}</tbody></table>
  ${(!rows)?'<div class="empty">还没有配套,按上面「+ 加配套」开始</div>':''}</div>`;
}

/* ================= Student modal with rounds ================= */
window.openStudent=function(id){
  const isNew=!id;
  const src=isNew?{id:'',name:'',note:'',flag:'OK',review:'',detail:'',status_auto:'',trainers:[],
      rounds:[{trainers:[],package:'',price:0,dates:'',logged:0,claim:0}]}
    :DB.students.find(x=>x.id===id);
  EDIT=JSON.parse(JSON.stringify(src)); EDIT._isNew=isNew; EDIT._origId=id;
  if(!EDIT.rounds||!EDIT.rounds.length)EDIT.rounds=[{trainers:[],package:'',price:0,dates:'',logged:0,claim:0}];
  drawModal(); document.getElementById('ov').classList.add('show');
};
function drawModal(){
  const s=EDIT,isNew=s._isNew,tnames=trainerNames(),pkgs=DB.package_profiles||[];
  let tl=0,cl=0,rev=0; s.rounds.forEach(r=>{tl+=+r.logged||0;cl+=+r.claim||0;rev+=+r.price||0;});
  const roundCards=s.rounds.map((r,i)=>{
    const p=findPkg(r.package), cap=p?capOf(p.name):0, over=cap>0&&(+r.claim||0)>cap;
    const tchips=tnames.map(t=>`<span class="tchip ${r.trainers.includes(t)?'on':''}" onclick="rTr(${i},'${esc(t)}')">${esc(t)}</span>`).join('');
    const pkgopts=`<option value="">— 选配套 —</option>`+pkgs.map(p=>`<option value="${esc(p.id)}" ${r.package===p.id?'selected':''}>${esc(pkgLabel(p))}</option>`).join('');
    return `<div class="rcard ${over?'over':''}">
      <div class="rh"><b>第 ${i+1} 轮 renew</b>${over?`<span class="tag t-over" style="font-size:10px">超签:claim ${r.claim} > 配套 ${cap}</span>`:''}
        ${s.rounds.length>1?`<button class="x" onclick="rDel(${i})" title="删除这轮">×</button>`:''}</div>
      <div class="fg" style="margin-bottom:8px"><label>教练(可多选)</label><div class="tsel">${tchips}</div></div>
      <div class="frow">
        <div class="fg" style="margin-bottom:8px"><label>配套 Package</label><select onchange="rPkg(${i},this.value)">${pkgopts}</select></div>
        <div class="fg" style="margin-bottom:8px"><label>日期范围 Dates</label><input value="${esc(r.dates)}" placeholder="如 2024 Mar–Jun" oninput="rSet(${i},'dates',this.value)"/></div>
      </div>
      <div class="frow">
        <div class="fg" style="margin-bottom:0"><label>手写堂数 Logged</label><input type="number" value="${r.logged||0}" oninput="rSet(${i},'logged',this.value)"/></div>
        <div class="fg" style="margin-bottom:0"><label>Claim 堂数</label><input type="number" value="${r.claim||0}" oninput="rSet(${i},'claim',this.value)"/></div>
      </div>
      ${p?`<div class="mini" style="margin-top:6px">此轮配套价:RM${p.price} · 配套上限 ${cap}堂</div>`:'<div class="mini" style="margin-top:6px">未选配套(营业额不计此轮)</div>'}
    </div>`;}).join('');
  const m=document.getElementById('modal');
  m.innerHTML=`<div class="mh"><h3>${isNew?'新增学生 Add':esc(s.name)}</h3><button class="x" onclick="closeOv()">×</button></div>
    <div class="mb">
      ${(!isNew&&s.detail)?`<div class="info-box">原始记录: ${esc(s.detail)}</div>`:''}
      <div class="fg"><label>学生名 Name</label><input id="f_name" value="${esc(s.name)}"/></div>
      <div class="fg"><label>Renew 轮次 — 每次续约一张卡</label>
        <div class="info-box" style="margin-bottom:10px">每轮选教练(可多选)+ 配套 + 填日期、手写、claim。系统逐轮检查超签并加总。</div>
        ${roundCards}
        <button class="btn gold sm" onclick="rAdd()">+ 加一轮 renew</button>
      </div>
      <div class="card" style="margin:0 0 14px"><div style="padding:10px 14px;display:flex;gap:20px;flex-wrap:wrap">
        <div><span class="mini">总手写</span><br><b class="num">${tl}</b></div>
        <div><span class="mini">总Claim</span><br><b class="num" style="color:${cl-tl>2?'var(--rust)':'inherit'}">${cl}</b></div>
        <div><span class="mini">差异</span><br>${diffCell(cl-tl)}</div>
        <div><span class="mini">营业额(已选配套)</span><br><b class="num">RM${rev}</b></div>
      </div></div>
      <div class="frow"><div class="fg"><label>核对 Review</label><select id="f_rv">
          <option value="" ${!s.review?'selected':''}>未核</option><option value="已确认" ${s.review==='已确认'?'selected':''}>✓已确认</option>
          <option value="有问题" ${s.review==='有问题'?'selected':''}>⚠有问题</option></select></div>
        <div class="fg"><label>状态 Flag</label><select id="f_flag">
          ${['OK','OVER','UNDER','COLLISION','NO_MATCH','NO_CLAIM','NO_LOG'].map(f=>`<option ${s.flag===f?'selected':''}>${f}</option>`).join('')}</select></div></div>
      <div class="fg"><label>备注 Note</label><textarea id="f_note" rows="2">${esc(s.note)}</textarea></div>
    </div>
    <div class="mf">${!isNew?`<button class="btn rust" style="margin-right:auto" onclick="delStudent('${esc(s._origId)}')">删除</button>`:''}
      <button class="btn ghost" onclick="closeOv()">取消</button>
      <button class="btn" onclick="saveStudent()">保存 Save</button></div>`;
}
function snapModalText(){EDIT.name=val('f_name');EDIT.review=val('f_rv');EDIT.flag=val('f_flag');EDIT.note=val('f_note');}
function redraw(){snapModalText();drawModal();}
function val(id){const e=document.getElementById(id);return e?e.value:'';}
window.rAdd=function(){EDIT.rounds.push({trainers:[],package:'',price:0,dates:'',logged:0,claim:0});redraw();};
window.rDel=function(i){EDIT.rounds.splice(i,1);redraw();};
window.rSet=function(i,k,v){EDIT.rounds[i][k]=(k==='logged'||k==='claim')?(+v||0):v;
  if(k==='logged'||k==='claim')redraw();};
window.rTr=function(i,t){const a=EDIT.rounds[i].trainers,x=a.indexOf(t);if(x>=0)a.splice(x,1);else a.push(t);redraw();};
window.rPkg=function(i,id){EDIT.rounds[i].package=id;const p=findPkg(id);EDIT.rounds[i].price=p?(+p.price||0):0;redraw();};
window.saveStudent=async function(){
  snapModalText();const name=EDIT.name.trim();if(!name){toast('请填学生名');return;}
  const allt=[];EDIT.rounds.forEach(r=>(r.trainers||[]).forEach(t=>{if(!allt.includes(t))allt.push(t);}));
  const clean={id:EDIT.id,name,note:EDIT.note,flag:EDIT.flag,review:EDIT.review,detail:EDIT.detail||'',
    status_auto:EDIT.status_auto||'',rounds:EDIT.rounds,trainers:allt};
  recompute(clean);
  if(EDIT._isNew){clean.id=name+'_'+Date.now();clean.status_auto='手动新增';DB.students.push(clean);}
  else{const t=DB.students.find(x=>x.id===EDIT._origId);Object.keys(t).forEach(k=>delete t[k]);Object.assign(t,clean);}
  await persist();closeOv();toast('已保存 ✓');
};
window.delStudent=async function(id){if(!confirm('确定删除此学生?'))return;DB.students=DB.students.filter(x=>x.id!==id);await persist();closeOv();toast('已删除');};
window.setReview=async function(id,v){DB.students.find(x=>x.id===id).review=v;await persist(true);updateBadges();};
window.setNote=async function(id,v){DB.students.find(x=>x.id===id).note=v;await persist(true);};
window.setPend=async function(i,k,v){DB.pending[i][k]=v;await persist(true);updateBadges();};

/* trainer profile actions */
window.addTrainer=async function(){const e=document.getElementById('newtr');const n=e.value.trim();if(!n)return;
  if(!DB.trainer_profiles)DB.trainer_profiles=[];
  if(DB.trainer_profiles.some(t=>t.name===n)){toast('已存在');return;}
  DB.trainer_profiles.push({name:n,active:true,note:''});await persist();toast('已加教练 ✓');};
window.setTrainer=async function(i,k,v){DB.trainer_profiles[i][k]=v;await persist();};
window.delTrainer=async function(i){if(!confirm('删除此教练?(学生已选的不会自动移除)'))return;DB.trainer_profiles.splice(i,1);await persist();toast('已删除');};

/* package profile actions */
window.addPkg=async function(){if(!DB.package_profiles)DB.package_profiles=[];
  DB.package_profiles.push({id:'pkg_'+Date.now(),year:new Date().getFullYear(),name:'',price:0,note:''});await persist();toast('已加配套,请填资料');};
window.setPkg=async function(i,k,v){DB.package_profiles[i][k]=v;await persist(true);};
window.delPkg=async function(i){if(!confirm('删除此配套?'))return;DB.package_profiles.splice(i,1);await persist();toast('已删除');};

window.setFilter=function(f){FILTER=f;render();};
window.setYear=function(y){BIZYEAR=y;render();};
window.onSearch=function(v){Q=v.toLowerCase();render(true);};
window.closeOv=function(){document.getElementById('ov').classList.remove('show');};
document.getElementById('ov').addEventListener('click',e=>{if(e.target.id==='ov')closeOv();});

function updateBadges(){
  const fl=DB.students.filter(s=>['OVER','UNDER','COLLISION','NO_MATCH','NO_CLAIM','NO_LOG'].includes(s.flag));
  const undone=fl.filter(s=>!s.review).length,pend=DB.pending.filter(p=>!p.status).length;
  [['bOps',undone],['bAlign',undone],['bPend',pend]].forEach(([id,n])=>{
    const el=document.getElementById(id);if(el){el.textContent=n||'';el.style.display=n?'':'none';}});
}
function render(keepSearch){
  if(!DB)return; recomputeAll();
  const v={ops:vOps,biz:vBiz,students:vStudents,align:vAlign,pending:vPending,trainers:vTrainers,packages:vPackages}[VIEW];
  document.getElementById('view').innerHTML=v();
  document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('on',a.dataset.v===VIEW));
  updateBadges();
  if(keepSearch&&VIEW==='students'){const s=document.getElementById('srch');if(s){s.focus();s.setSelectionRange(s.value.length,s.value.length);}}
}
document.getElementById('nav').addEventListener('click',e=>{const a=e.target.closest('a');if(!a)return;VIEW=a.dataset.v;Q='';FILTER='all';render();});
</script>
</body>
</html>
